appId: com.streamsync.app
productName: StreamSync
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
mac:
  category: public.app-category.video
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
  artifactName: StreamSync-${arch}.${ext}
  extendInfo:
    NSCameraUsageDescription: StreamSync needs camera access so you can go live on TikTok, YouTube, Instagram, and Facebook.
    NSMicrophoneUsageDescription: StreamSync needs microphone access so viewers can hear you during your live streams.
  target:
    - target: dmg
      arch: [x64, arm64]
win:
  target: nsis
  artifactName: StreamSync-Setup.${ext}
linux:
  target: [AppImage, deb]
  category: Video
  maintainer: hello@streamsync.dev
  artifactName: StreamSync.${ext}
