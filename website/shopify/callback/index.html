<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamSync - Shopify Authorization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0e1a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
      background-color: #1a1f35;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #f97316;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #111827;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 32px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 18px;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background-color: #f97316;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #ea580c;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
    }

    .error {
      color: #ef4444;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Stream<span>Sync</span></div>

    <div class="spinner" id="spinner"></div>

    <p class="status" id="status">Redirecting to StreamSync...</p>
    <p class="subtitle" id="subtitle">Completing Shopify authorization</p>

    <a class="btn" id="openBtn" href="#" style="display: none;">Open StreamSync</a>

    <p class="hint" id="hint" style="display: none;">
      If StreamSync doesn't open automatically, click the button above.
    </p>

    <p class="error" id="error"></p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var shop = params.get('shop');
      var state = params.get('state');
      var hmac = params.get('hmac');

      if (!code || !shop) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Authorization Failed';
        document.getElementById('subtitle').textContent = 'Missing required parameters from Shopify.';
        var errorEl = document.getElementById('error');
        errorEl.style.display = 'block';
        errorEl.textContent = 'The redirect URL is missing the "code" or "shop" parameter. Please try again from StreamSync.';
        return;
      }

      // Build the custom protocol URL, forwarding all relevant params
      var protocolUrl = 'streamsync://shopify/callback?code=' + encodeURIComponent(code) + '&shop=' + encodeURIComponent(shop);
      if (state) protocolUrl += '&state=' + encodeURIComponent(state);
      if (hmac) protocolUrl += '&hmac=' + encodeURIComponent(hmac);

      // Set the fallback button href
      var openBtn = document.getElementById('openBtn');
      openBtn.href = protocolUrl;

      // Show the fallback button and hint after a short delay
      setTimeout(function () {
        openBtn.style.display = 'inline-block';
        document.getElementById('hint').style.display = 'block';
      }, 1500);

      // Attempt the auto-redirect
      window.location.href = protocolUrl;
    })();
  </script>
</body>
</html>
